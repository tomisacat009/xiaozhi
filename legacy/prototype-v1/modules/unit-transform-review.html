    <title>函数平移与伸缩总复习-高中数学可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="函数平移与伸缩总复习" data-summary="把上下平移、左右平移和伸缩变化统一放进一个交互页里，帮助孩子真正形成函数变换框架。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./functions.html">返回函数模块</a>
        <span class="mini-note">第二阶段单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂左右平移和上下平移的区别</li>
            <li>看懂横向伸缩和纵向伸缩的不同感受</li>
            <li>把“式子一改，图像就变”建立成统一框架</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>
              函数变换是高一阶段最需要形成整体感的一块内容。很多题并不难，但孩子一到“左移右移、伸长压缩”就容易混乱，往往是因为图像层面的感觉没建立起来。
            </p>
            <p>
              这个单元不追求一下子覆盖所有函数，而是先用几个代表性的底函数，把最常见的平移与伸缩放到一起讲清楚，让孩子先形成统一的观察顺序。
            </p>
          </div>
          <aside class="cta-box">
            <h2>进入当前演示器</h2>
            <p>直接打开函数变换交互页，拖动平移和伸缩参数，观察图像怎样跟着变。</p>
            <a class="cta-button" href="../demos/函数变换演示器/index.html">打开函数变换演示器</a>
          </aside>
        </div>
