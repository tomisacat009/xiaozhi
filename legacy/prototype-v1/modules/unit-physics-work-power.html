  <body data-root="../" data-title="功与功率" data-summary="把力、位移、时间和能量转移放回同一过程里，帮助孩子看懂“做功”为什么不是单纯套公式。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./physics-energy.html">返回功能量模块</a>
        <span class="mini-note">物理单元 · 已补充</span>
      </div>
      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂做功到底对应什么样的能量变化</li>
            <li>看懂同样的功为什么还要比较“做得快不快”</li>
            <li>把力和位移的夹角含义重新连回图像直觉</li>
          </ul>
        </aside>
      </header>
      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>功与功率是很多孩子第一次明显感到“公式背了但不知道在说什么”的地方。其实它们真正想表达的是：力在位移过程中有没有把能量传过去，以及传得快不快。</p>
            <p>这一单元后续很适合做成“力方向、位移长度、时间滑条”和“能量条图”联动，让孩子把抽象公式重新看成过程表达。</p>
          </div>
          <aside class="cta-box">
            <h2>后续可视化方向</h2>
            <p>可做成力与位移夹角变化、功值即时变化和功率速度对照视图。</p>
            <a class="cta-button" href="./physics-energy.html">返回功能量模块</a>
          </aside>
        </div>
