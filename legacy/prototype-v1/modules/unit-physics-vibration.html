  <body data-root="../" data-title="简谐振动的周期与图像" data-summary="帮助孩子把位移、振幅、周期和往返过程对应起来，让简谐振动不再只是抽象定义堆叠。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./physics-wave.html">返回波动模块</a>
        <span class="mini-note">物理单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂周期、振幅和平衡位置分别在描述什么</li>
            <li>看懂往返过程和图像上的一个周期如何对应</li>
            <li>避免只背定义却不会从图像读物理意义</li>
          </ul>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>简谐振动往往是孩子第一次明显觉得“图像和过程分家了”的章节。书上有图，有定义，但脑中没有真正连起来，所以一到题目里就容易乱。</p>
            <p>这一单元先做最基础的连接：位移图像上的点，到底对应现实中物体处在什么位置、向哪边运动、已经经历了多长过程。</p>
          </div>
          <aside class="cta-box">
            <h2>后续可视化方向</h2>
            <p>后面可以把质点往返运动和位移-时间图像做成同步动画，让孩子看到“物体怎么动，图像就怎么画出来”。</p>
            <a class="cta-button" href="./physics-wave.html">返回波动模块</a>
          </aside>
        </div>
      </section>
