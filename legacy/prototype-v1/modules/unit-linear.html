<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一次函数变化-高中数学可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="一次函数变化" data-summary="用最基础也最关键的一条直线，让孩子先把斜率、截距、增减趋势和交点建立成直观感觉。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./functions.html">返回函数模块</a>
        <span class="mini-note">MVP 单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂 `k` 决定方向和陡缓</li>
            <li>看懂 `b` 决定上下位置</li>
            <li>把直线和坐标轴交点看成图像信息</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>
              一次函数是整个函数模块最适合打底的内容。它的参数少、变化清楚，很适合让孩子先建立“表达式一变，图像就跟着变”的第一层理解。
            </p>
            <p>
              当前单元重点不是刷题，而是先让孩子真正看懂两句话：`k` 管倾斜，`b` 管平移。把这层感觉建立起来，后面学二次函数、解析几何会更顺。
            </p>
          </div>
          <aside class="cta-box">
            <h2>进入当前演示器</h2>
            <p>直接打开一次函数交互页，拖动斜率和截距，观察直线怎样变化。</p>
            <a class="cta-button" href="../demos/一次函数演示器/index.html">打开一次函数演示器</a>
          </aside>
        </div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
    <script src="../assets/system.js"></script>
  </body>
