<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>力的合成与分解-高中物理可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="力的合成与分解" data-summary="把多个力重新变成可以画、可以叠、可以拆的图形关系，帮助孩子减少纯向量符号造成的抽象负担。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./physics-force.html">返回受力模块</a>
        <span class="mini-note">物理单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂多个力为什么可以合成一个等效结果</li>
            <li>看懂分解不是“变魔术”，而是换角度看同一个力</li>
            <li>帮助孩子把平行四边形法则重新连回图形直觉</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>受力分析最容易卡住孩子的地方，不是不会算，而是“图没立起来”。如果脑中没有力的方向、大小和合成后的整体效果，公式和定理都只能变成死记。</p>
            <p>这一单元先把力看成箭头和方向，再去理解为什么能合、为什么能拆，让后面的斜面、平衡、运动分析都有一个稳定入口。</p>
          </div>
          <aside class="cta-box">
            <h2>后续可视化方向</h2>
            <p>后面可以把力箭头拖动、夹角变化和合力方向做成联动，让孩子直接看到“角度一变，合力就变”。</p>
            <a class="cta-button" href="./physics-force.html">返回受力模块</a>
          </aside>
        </div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
    <script src="../assets/system.js"></script>
