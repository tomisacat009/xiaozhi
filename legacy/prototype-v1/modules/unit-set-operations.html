<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>集合运算与韦恩图-高中数学可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="集合运算与韦恩图" data-summary="先把韦恩图的区域意义看懂，再把交集、并集、补集写成正式的集合表达。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./sets-logic.html">返回集合与逻辑模块</a>
        <span class="mini-note">高一入门单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂交集是“共同部分”，并集是“全部合起来”</li>
            <li>看懂补集一定要相对于全集来理解</li>
            <li>把图上的区域高亮和右侧结果集合对应起来</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>
              很多孩子会把“或”误读成只看重叠，把补集当成“剩下的都算”。这不是不会算，而是没有先把韦恩图区域和集合式子连起来。
            </p>
            <p>
              当前单元会把交、并、补放到同一张图里切换，让孩子先看区域，再回头读结果集合和文字表达，建立真正的空间感。
            </p>
          </div>
          <aside class="cta-box">
            <h2>进入当前演示器</h2>
            <p>切换交集、并集、补集，观察区域高亮、元素分布和结果集合如何同步联动。</p>
            <a class="cta-button" href="../demos/集合运算与韦恩图演示器/index.html">打开集合运算演示器</a>
          </aside>
        </div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
