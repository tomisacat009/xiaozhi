<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圆的标准方程与图像-高中数学可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="圆的标准方程与图像" data-summary="把圆心、半径和标准方程放到一张图里同步变化，让孩子真正理解方程里的每个参数都在图上对应什么。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./analytic-geometry.html">返回解析几何模块</a>
        <span class="mini-note">第二阶段单元 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂圆心变化就是图像平移</li>
            <li>看懂半径变化就是图像变大变小</li>
            <li>把标准方程中的符号和图像位置连起来</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>
              学圆的标准方程时，孩子最容易在符号上出错，比如圆心写成 `(h,k)` 后，方程里为什么会是 `(x-h)^2+(y-k)^2`。本质上还是图像感不够清楚。
            </p>
            <p>
              这个单元会让圆心和半径一边拖动一边变化，把方程和图像同步显示出来，让孩子先从“圆在哪里、大小是多少”这两件事抓住圆的本质。
            </p>
          </div>
          <aside class="cta-box">
            <h2>进入当前演示器</h2>
            <p>直接打开圆的标准方程交互页，拖动圆心和半径，观察方程如何同步变化。</p>
            <a class="cta-button" href="../demos/圆的标准方程演示器/index.html">打开圆的标准方程演示器</a>
          </aside>
        </div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
    <script src="../assets/system.js"></script>
  </body>
