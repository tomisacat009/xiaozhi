<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>递推数列生成过程-高中数学可视化学习系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-title="递推数列生成过程" data-summary="把后一项由前一项推出来的过程直接画出来，帮助孩子理解递推数列的生成逻辑，而不是只背形式。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="./sequences.html">返回数列模块</a>
        <span class="mini-note">数列扩展 · 已上线</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>这个单元在解决什么</h2>
          <ul class="mini-list">
            <li>看懂递推不是另一套死公式</li>
            <li>看懂每一项怎样从前一项生成</li>
            <li>建立“越推越快 / 越推越稳”的变化感</li>
          </ul>
        </aside>
      </header>

      <section class="summary-panel">
        <div class="summary-layout">
          <div>
            <h2>单元定位</h2>
            <p>
              递推数列是很多孩子在高二开始容易发蒙的内容，因为它不像等差等比那样一眼能看出公式，而是强调“后一项由前一项推出来”。
            </p>
            <p>
              这个单元会把递推过程一项一项画出来，让孩子先真正看懂生成规则，再去理解更复杂的数列题型。
            </p>
          </div>
          <aside class="cta-box">
            <h2>进入当前演示器</h2>
            <p>直接打开递推数列交互页，观察乘数和常数项怎样改变后续各项。</p>
            <a class="cta-button" href="../demos/递推数列演示器/index.html">打开递推数列演示器</a>
          </aside>
        </div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
    <script src="../assets/system.js"></script>
  </body>
</html>
