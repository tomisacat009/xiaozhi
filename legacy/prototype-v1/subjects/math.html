<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数学学科页-理科学习可视化系统</title>
    <link rel="stylesheet" href="../assets/system.css" />
  </head>
  <body data-root="../" data-subject="math" data-content-scope="math" data-title="高中数学可视化学习系统" data-summary="把高中数学里适合动态展示的内容，整理成可交互、可讲解、可复盘的学习辅助系统。">
    <div class="shell">
      <div class="topbar">
        <a class="home-link" href="../index.html">返回学科首页</a>
        <span class="mini-note">数学学科页 · 已形成 20+ 可运行单元</span>
      </div>

      <header class="hero">
        <section class="hero-main">
          <p class="eyebrow" id="pageBadge"></p>
          <h1 id="pageTitle"></h1>
          <p id="pageSummary"></p>
        </section>
        <aside class="hero-side">
          <h2>当前数学主线</h2>
          <ul class="mini-list" id="subjectHighlights"></ul>
        </aside>
      </header>

      <section class="section">
        <div class="section-head">
          <h2>知识地图</h2>
          <span class="section-lead">地图已经从图像变化扩展到集合语言，当前进入“高一主线持续补深”的阶段。</span>
        </div>
        <div class="grid module-grid" id="moduleGrid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>当前单元</h2>
          <span class="section-lead">已经从最初样板单元扩展到多模块联动，后续重点放在综合理解和复习型页面。</span>
        </div>
        <div class="grid mvp-grid" id="mvpGrid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>学习路径</h2>
          <span class="section-lead">按阶段使用，不必一次全部学完。</span>
        </div>
        <div class="grid path-grid" id="pathGrid"></div>
      </section>
    </div>

    <script src="../assets/content.js"></script>
    <script src="../assets/system.js"></script>
  </body>
</html>
